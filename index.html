<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Restaurante</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }

    .card-box {
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .menu-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    .tab-btn {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      background: #f0f0f0;
    }

    .tab-btn:hover {
      background: #dddddd;
    }

    .grid-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }

    .item-card {
      background: white;
      border: 2px solid #ddd;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
    }

    .item-card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
    }

    .item-card p {
      margin: 0;
      padding: 10px;
      text-align: center;
      font-weight: bold;
    }

    .finalizar {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 20px;
    }

    .ticket {
      margin-top: 15px;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 12px;
      background: #fafafa;
    }

    @media (max-width: 768px) {
      .layout {
        grid-template-columns: 1fr;
      }

      body {
        padding: 12px;
      }

      .item-card img {
        height: 120px;
      }
    }
  </style>
</head>
<body>

<h1>Sistema Restaurante - Garzón / Cocina / Bar / Caja</h1>

<div class="layout">
  <div class="card-box">
    <h2>Garzón</h2>

    <input id="mesa" type="number" placeholder="Número de mesa">

    <div class="menu-tabs">
      <button class="tab-btn" onclick="mostrarCategoria('entrada')">Entradas o Aperitivos</button>
      <button class="tab-btn" onclick="mostrarCategoria('bebida')">Bebestibles</button>
      <button class="tab-btn" onclick="mostrarCategoria('fondo')">Plato de Fondo</button>
      <button class="tab-btn" onclick="mostrarCategoria('postre')">Postres o Bajativos</button>
    </div>

    <div id="zonaCards">
      <p>Seleccione una categoría para comenzar.</p>
    </div>

    <button class="finalizar" onclick="generarPedido()">Generar Ticket</button>

    <div id="ticket"></div>
  </div>

  <div>
    <div class="card-box">
      <h2>Cocina</h2>
      <div id="cocina">Esperando pedidos...</div>
    </div>

    <div class="card-box" style="margin-top:20px;">
      <h2>Bar</h2>
      <div id="bar">Esperando pedidos...</div>
    </div>

    <div class="card-box" style="margin-top:20px;">
      <h2>Caja</h2>
      <div id="caja">Esperando pedidos...</div>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_PROYECTO.firebaseapp.com",
  databaseURL: "https://TU_PROYECTO-default-rtdb.firebaseio.com",
  projectId: "TU_PROYECTO",
  storageBucket: "TU_PROYECTO.appspot.com",
  messagingSenderId: "XXXXXXXX",
  appId: "TU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const pedidosRef = ref(db, 'pedidos');

window.guardarPedidoFirebase = function(data) {
  push(pedidosRef, data);
};

window.escucharPedidosFirebase = function() {
  onValue(pedidosRef, (snapshot) => {
    const data = snapshot.val() || {};

    let cocinaHTML = '';
    let barHTML = '';
    let cajaHTML = '';

    Object.values(data).forEach((pedido) => {
      cocinaHTML +=
        '<div class="ticket"><strong>Mesa ' + pedido.mesa + '</strong><br><br>' +
        'Entradas:<br>' + (pedido.entrada?.join('<br>') || '-') + '<br><br>' +
        'Fondos:<br>' + (pedido.fondo?.join('<br>') || '-') + '<br><br>' +
        'Postres:<br>' + (pedido.postre?.join('<br>') || '-') +
        '</div>';

      barHTML +=
        '<div class="ticket"><strong>Mesa ' + pedido.mesa + '</strong><br><br>' +
        'Bebidas:<br>' + (pedido.bebida?.join('<br>') || '-') +
        '</div>';

      cajaHTML +=
        '<div class="ticket"><strong>Mesa ' + pedido.mesa + '</strong><br><br>' +
        'Subtotal: $' + Number(pedido.subtotal || 0).toLocaleString('es-CL') + '<br>' +
        'Propina: $' + Number(pedido.propina || 0).toLocaleString('es-CL') + '<br>' +
        'Total: $' + Number(pedido.total || 0).toLocaleString('es-CL') +
        '</div>';
    });

    document.getElementById('cocina').innerHTML = cocinaHTML || 'Esperando pedidos...';
    document.getElementById('bar').innerHTML = barHTML || 'Esperando pedidos...';
    document.getElementById('caja').innerHTML = cajaHTML || 'Esperando pedidos...';
  });
};

window.escucharPedidosFirebase();
</script>

<script>
const precios = {
  'Bruschetta': 6500,
  'Empanadas': 5500,
  'Camarones Pil Pil': 8900,
  'Coca-Cola': 2500,
  'Jugo Natural': 3200,
  'Agua Mineral': 2200,
  'Lomo Vetado': 15900,
  'Pasta Alfredo': 11900,
  'Salmón Grillado': 14900,
  'Tiramisú': 4900,
  'Helado Artesanal': 3900,
  'Torta Chocolate': 5200
};

const datos = {
  entrada: ['Bruschetta', 'Empanadas', 'Camarones Pil Pil'],
  bebida: ['Coca-Cola', 'Jugo Natural', 'Agua Mineral'],
  fondo: ['Lomo Vetado', 'Pasta Alfredo', 'Salmón Grillado'],
  postre: ['Tiramisú', 'Helado Artesanal', 'Torta Chocolate']
};

const seleccion = {
  entrada: [],
  bebida: [],
  fondo: [],
  postre: []
};

function mostrarCategoria(tipo) {
  const zona = document.getElementById('zonaCards');

  let html = '<h3>' + tipo.toUpperCase() + '</h3>';
  html += '<div class="grid-cards">';

  datos[tipo].forEach(function(item) {
    html += `
      <div class="item-card" onclick="seleccionar('${tipo}','${item}')">
        <img src="https://via.placeholder.com/300x200?text=${encodeURIComponent(item)}" alt="${item}">
        <p>${item}<br>$${precios[item].toLocaleString('es-CL')}</p>
      </div>
    `;
  });

  html += '</div>';
  zona.innerHTML = html;
}

function seleccionar(tipo, item) {
  if (tipo !== 'entrada') {
    const totalComensales = seleccion.entrada.length;

    if (totalComensales === 0) {
      alert('Primero debe seleccionar entradas');
      return;
    }

    if (seleccion[tipo].length >= totalComensales) {
      alert('Ya completó el máximo permitido para ' + tipo);
      return;
    }
  }

  seleccion[tipo].push(item);
  alert(item + ' agregado');
}

function calcularTotal() {
  let total = 0;

  for (const categoria in seleccion) {
    seleccion[categoria].forEach(function(item) {
      total += precios[item] || 0;
    });
  }

  return total;
}

function formatear(lista) {
  if (!lista.length) return '-';

  return lista.map(function(item) {
    return item + ' - $' + precios[item].toLocaleString('es-CL');
  }).join('<br>');
}

function generarPedido() {
  const mesa = document.getElementById('mesa').value;

  if (!mesa) {
    alert('Ingrese número de mesa');
    return;
  }

  if (seleccion.entrada.length === 0) {
    alert('Debe seleccionar al menos una entrada');
    return;
  }

  const subtotal = calcularTotal();
  const propina = Math.round(subtotal * 0.10);
  const total = subtotal + propina;
  const comensales = seleccion.entrada.length;

  document.getElementById('ticket').innerHTML =
    '<div class="ticket">' +
    '<h3>Ticket Mesa ' + mesa + '</h3>' +
    '<strong>Comensales:</strong> ' + comensales + '<br><br>' +
    '<strong>Entradas:</strong><br>' + formatear(seleccion.entrada) + '<br><br>' +
    '<strong>Fondos:</strong><br>' + formatear(seleccion.fondo) + '<br><br>' +
    '<strong>Bebidas:</strong><br>' + formatear(seleccion.bebida) + '<br><br>' +
    '<strong>Postres:</strong><br>' + formatear(seleccion.postre) + '<br><br>' +
    '<strong>Subtotal:</strong> $' + subtotal.toLocaleString('es-CL') + '<br>' +
    '<strong>Propina 10%:</strong> $' + propina.toLocaleString('es-CL') + '<br>' +
    '<strong>Total Final:</strong> $' + total.toLocaleString('es-CL') +
    '</div>';

  guardarPedidoFirebase({
    mesa,
    entrada: seleccion.entrada,
    bebida: seleccion.bebida,
    fondo: seleccion.fondo,
    postre: seleccion.postre,
    subtotal,
    propina,
    total
  });

  document.getElementById('cocina').innerHTML +=
    '<div class="ticket"><strong>Mesa ' + mesa + '</strong><br><br>' +
    'Entradas:<br>' + seleccion.entrada.join('<br>') + '<br><br>' +
    'Fondos:<br>' + seleccion.fondo.join('<br>') + '<br><br>' +
    'Postres:<br>' + seleccion.postre.join('<br>') +
    '</div>';

  document.getElementById('bar').innerHTML +=
    '<div class="ticket"><strong>Mesa ' + mesa + '</strong><br><br>' +
    'Bebidas:<br>' + formatear(seleccion.bebida) +
    '</div>';

  document.getElementById('caja').innerHTML +=
    '<div class="ticket"><strong>Mesa ' + mesa + '</strong><br><br>' +
    'Subtotal: $' + subtotal.toLocaleString('es-CL') + '<br>' +
    'Propina: $' + propina.toLocaleString('es-CL') + '<br>' +
    'Total: $' + total.toLocaleString('es-CL') +
    '</div>';
}
</script>

</body>
</html>
