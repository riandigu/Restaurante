<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Restaurante</title>
  <style>
    .hamburguesa {
      display: none;
      font-size: 28px;
      background: none;
      border: none;
      cursor: pointer;
      margin-bottom: 15px;
    }

    .menu-mobile {
      display: block;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }
    h1, h2, h3 { margin-top: 0; }
    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }
    .card-box {
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }
    .menu-principal {
      transition: 0.3s;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .btn-menu, .finalizar {
      padding: 14px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
    }
    .grid-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }
    .item-card {
      background: white;
      border: 2px solid #ddd;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
    }
    .item-card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
    }
    .item-card p {
      text-align: center;
      font-weight: bold;
      padding: 10px;
      margin: 0;
    }
    .ticket {
      margin-top: 15px;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 12px;
      background: #fafafa;
    }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
    }
  @media (max-width: 768px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .hamburguesa {
        display: block;
      }

      .menu-principal {
        display: none;
      }

      .menu-principal.activo {
        display: grid;
        grid-template-columns: 1fr;
      }

      body {
        padding: 12px;
      }

      .item-card img {
        height: 120px;
      }
    }
  </style>
</head>
<body>

<h1>Sistema Restaurante - Garzón / Cocina / Caja</h1>

<div class="layout">
  <div class="card-box">
    <h2>Garzón</h2>
    <button class="hamburguesa" onclick="toggleMenu()">☰ Menú</button>
    <input id="mesa" type="number" placeholder="Número de mesa">

    <div class="menu-principal">
      <button class="btn-menu" onclick="mostrarCategoria('entrada')">Entradas y Aperitivos</button>
      <button class="btn-menu" onclick="mostrarCategoria('bebida')">Bebestibles</button>
      <button class="btn-menu" onclick="mostrarCategoria('fondo')">Plato de Fondo</button>
      <button class="btn-menu" onclick="mostrarCategoria('vino')">Vinos y Licores</button>
      <button class="btn-menu" onclick="mostrarCategoria('postre')">Postres</button>
    </div>

    <div id="zonaCards">
      <p>Seleccione una categoría para comenzar.</p>
    </div>

    <button class="finalizar" onclick="generarPedido()">Generar Ticket</button>
    <div id="ticket"></div>
  </div>

  <div>
    <div class="card-box">
      <h2>Cocina</h2>
      <div id="cocina">Esperando pedidos...</div>
    </div>

    <div class="card-box" style="margin-top:20px;">
      <h2>Bar</h2>
      <div id="bar">Esperando pedidos...</div>
    </div>

    <div class="card-box" style="margin-top:20px;">
      <h2>Caja</h2>
      <div id="caja">Esperando pedidos...</div>
    </div>
  </div>
</div>

<script>
const precios = {
  'Bruschetta': 6500,
  'Empanadas': 5500,
  'Camarones Pil Pil': 8900,
  'Coca-Cola': 2500,
  'Jugo Natural': 3200,
  'Agua Mineral': 2200,
  'Lomo Vetado': 15900,
  'Pasta Alfredo': 11900,
  'Salmón Grillado': 14900,
  'Copa Carmenere': 4800,
  'Pisco Sour': 5900,
  'Cerveza Artesanal': 4500,
  'Tiramisú': 4900,
  'Helado Artesanal': 3900,
  'Torta Chocolate': 5200
};

const datos = {
  entrada: ['Bruschetta', 'Empanadas', 'Camarones Pil Pil'],
  bebida: ['Coca-Cola', 'Jugo Natural', 'Agua Mineral'],
  fondo: ['Lomo Vetado', 'Pasta Alfredo', 'Salmón Grillado'],
  vino: ['Copa Carmenere', 'Pisco Sour', 'Cerveza Artesanal'],
  postre: ['Tiramisú', 'Helado Artesanal', 'Torta Chocolate']
};

const seleccion = {
  entrada: [],
  bebida: [],
  fondo: [],
  vino: [],
  postre: []
};

function toggleMenu() {
  const menu = document.querySelector('.menu-principal');
  menu.classList.toggle('activo');
}

function mostrarCategoria(tipo) {
  const menu = document.querySelector('.menu-principal');
  if (window.innerWidth <= 768) {
    menu.classList.remove('activo');
  }
  const zona = document.getElementById('zonaCards');

  let html = '<h3>' + tipo.toUpperCase() + '</h3>';
  html += '<div class="grid-cards">';

  datos[tipo].forEach(function(item) {
    html += `
      <div class="item-card" onclick="seleccionar('${tipo}','${item}')">
        <img src="https://via.placeholder.com/300x200?text=${encodeURIComponent(item)}" alt="${item}">
        <p>${item}</p>
      </div>
    `;
  });

  html += '</div>';
  zona.innerHTML = html;
}

function seleccionar(tipo, item) {
  if (tipo !== 'entrada') {
    const totalComensales = seleccion.entrada.length;

    if (totalComensales === 0) {
      alert('Primero debe seleccionar entradas');
      return;
    }

    if (seleccion[tipo].length >= totalComensales) {
      alert('Ya completó el máximo permitido para ' + tipo);
      return;
    }
  }

  seleccion[tipo].push(item);
  alert(item + ' agregado en ' + tipo + '. Total: ' + seleccion[tipo].length);
}

function calcularTotal() {
  let total = 0;

  for (const categoria in seleccion) {
    seleccion[categoria].forEach(function(item) {
      total += precios[item] || 0;
    });
  }

  return total;
}

function formatearConPrecio(lista) {
  if (!lista.length) return '-';

  return lista.map(function(item) {
    const precio = precios[item] || 0;
    return item + ' - $' + precio.toLocaleString('es-CL');
  }).join('<br>');
}

function generarPedido() {
  const mesa = document.getElementById('mesa').value;

  if (!mesa) {
    alert('Ingrese número de mesa');
    return;
  }

  const totalComensales = seleccion.entrada.length;

  if (totalComensales === 0) {
    alert('Debe seleccionar al menos una entrada');
    return;
  }

  const totalTicket = calcularTotal();
  const propina = Math.round(totalTicket * 0.10);
  const totalFinal = totalTicket + propina;

  document.getElementById('ticket').innerHTML =
    '<div class="ticket">' +
    '<h3>Ticket Mesa ' + mesa + '</h3>' +
    '<strong>Comensales:</strong> ' + totalComensales + '<br><br>' +
    '<strong>Entradas:</strong><br>' + formatearConPrecio(seleccion.entrada) + '<br><br>' +
    '<strong>Fondos:</strong><br>' + formatearConPrecio(seleccion.fondo) + '<br><br>' +
    '<strong>Bebidas:</strong><br>' + formatearConPrecio(seleccion.bebida) + '<br><br>' +
    '<strong>Vinos/Licores:</strong><br>' + formatearConPrecio(seleccion.vino) + '<br><br>' +
    '<strong>Postres:</strong><br>' + formatearConPrecio(seleccion.postre) + '<br><br>' +
    '<strong>Subtotal Consumo:</strong> $' + totalTicket.toLocaleString('es-CL') + '<br><br>' +
    '<strong>Propina 10%:</strong> $' + propina.toLocaleString('es-CL') + '<br><br>' +
    '<strong>TOTAL FINAL:</strong> $' + totalFinal.toLocaleString('es-CL') +
    '</div>';

  document.getElementById('cocina').innerHTML +=
    '<div class="ticket">' +
    '<strong>Mesa ' + mesa + '</strong><br>' +
    'Comensales: ' + totalComensales + '<br><br>' +
    'Entradas:<br>' + seleccion.entrada.join('<br>') + '<br><br>' +
    'Fondos:<br>' + seleccion.fondo.join('<br>') + '<br><br>' +
    'Postres:<br>' + seleccion.postre.join('<br>') +
    '</div>';

  document.getElementById('bar').innerHTML +=
    '<div class="ticket">' +
    '<strong>Mesa ' + mesa + '</strong><br>' +
    'Pedidos para Bar<br><br>' +
    '<strong>Bebidas:</strong><br>' + formatearConPrecio(seleccion.bebida) + '<br><br>' +
    '<strong>Vinos/Licores:</strong><br>' + formatearConPrecio(seleccion.vino) +
    '</div>';

  document.getElementById('caja').innerHTML +=
    '<div class="ticket">' +
    '<strong>Mesa ' + mesa + '</strong><br>' +
    'Cobro al finalizar servicio<br>' +
    '<strong>Subtotal:</strong> $' + totalTicket.toLocaleString('es-CL') + '<br>' +
    '<strong>Propina 10%:</strong> $' + propina.toLocaleString('es-CL') + '<br>' +
    '<strong>Total a cobrar:</strong> $' + totalFinal.toLocaleString('es-CL') + '<br><br>' +
    'Bebidas:<br>' + seleccion.bebida.join('<br>') + '<br><br>' +
    'Vinos:<br>' + seleccion.vino.join('<br>') +
    '</div>';
}
</script>

</body>
</html>
