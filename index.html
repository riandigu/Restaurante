<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedido Restaurante</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f5f5;
    }

    h1, h2 {
      margin-bottom: 10px;
    }

    .contenedor {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    select, input, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      margin-top: 20px;
      cursor: pointer;
      font-weight: bold;
    }

    .ticket {
      background: #fafafa;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #ddd;
      margin-top: 15px;
    }

    ul {
      padding-left: 20px;
    }
  </style>
</head>
<body>

  <h1>Sistema Restaurante - Garzón / Cocina / Caja</h1>

  <div class="contenedor">

    <!-- GARZÓN -->
    <div class="card">
      <h2>Sección Garzón</h2>

      <label>Mesa</label>
      <input type="number" id="mesa" placeholder="Ej: 5" />

      <label>Plato Principal</label>
      <select id="plato">
        <option>Pollo a la plancha</option>
        <option>Lomo vetado</option>
        <option>Pasta Alfredo</option>
      </select>

      <label>Postre</label>
      <select id="postre">
        <option>Tiramisú</option>
        <option>Helado artesanal</option>
        <option>Torta de chocolate</option>
      </select>

      <label>Bebida</label>
      <select id="bebida">
        <option>Coca-Cola</option>
        <option>Jugo natural</option>
        <option>Agua mineral</option>
      </select>

      <button onclick="generarPedido()">Generar Ticket</button>

      <div id="ticket" class="ticket"></div>
    </div>

    <!-- COCINA -->
    <div class="card">
      <h2>Sección Cocina</h2>
      <div id="cocina">
        <p>Esperando pedidos...</p>
      </div>
    </div>

    <!-- CAJA -->
    <div class="card">
      <h2>Sección Caja</h2>
      <div id="caja">
        <p>Esperando pedidos...</p>
      </div>
    </div>

  </div>

  <script>
    function generarPedido() {
      const mesa = document.getElementById('mesa').value;
      const plato = document.getElementById('plato').value;
      const postre = document.getElementById('postre').value;
      const bebida = document.getElementById('bebida').value;

      if (!mesa) {
        alert('Debe ingresar número de mesa');
        return;
      }

      const pedido = {
        mesa,
        plato,
        postre,
        bebida,
        fecha: new Date().toLocaleString()
      };

      // Ticket visual
      document.getElementById('ticket').innerHTML = `
        <h3>Ticket Generado</h3>
        <p><strong>Mesa:</strong> ${pedido.mesa}</p>
        <p><strong>Plato:</strong> ${pedido.plato}</p>
        <p><strong>Postre:</strong> ${pedido.postre}</p>
        <p><strong>Bebida:</strong> ${pedido.bebida}</p>
        <p><strong>Hora:</strong> ${pedido.fecha}</p>
      `;

      // Reflejo en cocina
      document.getElementById('cocina').innerHTML += `
        <div class="ticket">
          <strong>Mesa ${pedido.mesa}</strong><br>
          Plato: ${pedido.plato}<br>
          Postre: ${pedido.postre}<br>
          Bebida: ${pedido.bebida}
        </div>
      `;

      // Reflejo en caja
      document.getElementById('caja').innerHTML += `
        <div class="ticket">
          <strong>Mesa ${pedido.mesa}</strong><br>
          Pedido registrado para cobro<br>
          ${pedido.plato} + ${pedido.postre} + ${pedido.bebida}
        </div>
      `;
    }
  </script>

</body>
</html>
