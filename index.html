<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedido Restaurante</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #ffffff;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .hamburguesa {
      font-size: 28px;
      cursor: pointer;
      border: none;
      background: none;
    }

    .menu-lateral {
      position: fixed;
      top: 0;
      left: -280px;
      width: 260px;
      height: 100%;
      background: white;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      padding: 20px;
      transition: 0.3s;
      z-index: 200;
    }

    .menu-lateral.activo {
      left: 0;
    }

    .menu-lateral h2 {
      margin-top: 0;
    }

    .menu-lateral button {
      width: 100%;
      margin-bottom: 10px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .contenedor {
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .grid-menu {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }

    .item-menu {
      border: 2px solid #ddd;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      background: #fff;
      transition: 0.2s;
    }

    .item-menu:hover {
      transform: scale(1.02);
    }

    .item-menu img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .item-menu p {
      margin: 10px;
      font-weight: bold;
      text-align: center;
    }

    .seleccionado {
      border-color: #000;
    }

    .ticket {
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 15px;
      margin-top: 15px;
    }

    input, button.finalizar {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>

<div id="menuLateral" class="menu-lateral">
  <h2>Menú</h2>
  <button onclick="mostrarCategoria('entrada')">Entradas</button>
  <button onclick="mostrarCategoria('fondo')">Plato de Fondo</button>
  <button onclick="mostrarCategoria('bebida')">Bebidas</button>
  <button onclick="mostrarCategoria('postre')">Postres</button>
</div>

<header>
  <button class="hamburguesa" onclick="toggleMenu()">☰</button>
  <h1>Sistema Restaurante</h1>
</header>

<div class="contenedor">

  <div class="card">
    <h2>Garzón</h2>

    <input type="number" id="mesa" placeholder="Número de mesa" />

    <div id="zonaMenu">
      <p>Seleccione una categoría desde el menú hamburguesa.</p>
    </div>

    <button class="finalizar" onclick="generarPedido()">Generar Ticket</button>

    <div id="ticket"></div>
  </div>

  <div>
    <div class="card">
      <h2>Cocina</h2>
      <div id="cocina">Esperando pedidos...</div>
    </div>

    <div class="card" style="margin-top:20px;">
      <h2>Caja</h2>
      <div id="caja">Esperando pedidos...</div>
    </div>
  </div>

</div>

<script>
const datos = {
  entrada: ['Ensalada César', 'Sopa del día', 'Empanadas'],
  fondo: ['Lomo Vetado', 'Pasta Alfredo', 'Pollo Grillado'],
  bebida: ['Coca-Cola', 'Jugo Natural', 'Agua Mineral'],
  postre: ['Tiramisú', 'Helado', 'Torta Chocolate']
};

const seleccion = {
  entrada: '',
  fondo: '',
  bebida: '',
  postre: ''
};

function toggleMenu() {
  document.getElementById('menuLateral').classList.toggle('activo');
}

function mostrarCategoria(tipo) {
  const zona = document.getElementById('zonaMenu');

  zona.innerHTML = `
    <h3>${tipo.toUpperCase()}</h3>
    <div class="grid-menu">
      ${datos[tipo].map(item => `
        <div class="item-menu" onclick="seleccionar('${tipo}','${item}')">
          <img src="https://picsum.photos/300/200?random=${Math.random()}" alt="${item}">
          <p>${item}</p>
        </div>
      `).join('')}
    </div>
  `;

  toggleMenu();
}

function seleccionar(tipo, item) {
  seleccion[tipo] = item;
  alert(`${item} seleccionado en ${tipo}`);
}

function generarPedido() {
  const mesa = document.getElementById('mesa').value;

  if (!mesa) {
    alert('Ingrese número de mesa');
    return;
  }

  const pedido = {
    mesa,
    ...seleccion,
    fecha: new Date().toLocaleString()
  };

  document.getElementById('ticket').innerHTML = `
    <div class="ticket">
      <h3>Ticket Mesa ${pedido.mesa}</h3>
      Entrada: ${pedido.entrada || '-'}<br>
      Fondo: ${pedido.fondo || '-'}<br>
      Bebida: ${pedido.bebida || '-'}<br>
      Postre: ${pedido.postre || '-'}<br>
      Hora: ${pedido.fecha}
    </div>
  `;

  document.getElementById('cocina').innerHTML += `
    <div class="ticket">
      Mesa ${pedido.mesa}<br>
      Entrada: ${pedido.entrada}<br>
      Fondo: ${pedido.fondo}<br>
      Postre: ${pedido.postre}
    </div>
  `;

  document.getElementById('caja').innerHTML += `
    <div class="ticket">
      Mesa ${pedido.mesa}<br>
      Pedido listo para cobro<br>
      ${pedido.fondo} + ${pedido.bebida}
    </div>
  `;
}
</script>

</body>
</html>
